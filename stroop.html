<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stroop Task - jsPsych</title>
    <!-- jsPsych 7.3 CDN -->
    <script src="https://unpkg.com/jspsych@7.3.4"></script>
    <!-- プラグインの読み込み -->
    <script src="https://unpkg.com/@jspsych/plugin-html-keyboard-response@1.1.3"></script>
    <script src="https://unpkg.com/@jspsych/plugin-fullscreen@1.2.1"></script>
    <link href="https://unpkg.com/jspsych@7.3.4/css/jspsych.css" rel="stylesheet" type="text/css" />
    
    <style>
        body {
            background-color: #FFFFFF;
            color: #333;
            font-family: "Hiragino Kaku Gothic ProN", "Meiryo", sans-serif;
            margin: 0;
            padding: 0;
        }

        .jspsych-content {
            font-size: 24px; /* 教示のデフォルトサイズ */
        }

        .stroop-stimulus {
            font-size: 60px; /* 刺激の文字サイズ */
            font-weight: bold;
            user-select: none;
        }

        .instruction-text {
            line-height: 1.6;
            text-align: left;
            display: inline-block;
        }
    </style>
</head>
<body>
    <div id="jspsych-target"></div>

    <script>
        const jsPsych = initJsPsych({
            on_finish: function() {
                // 実験終了時にCSV形式でデータを表示
                jsPsych.data.displayData('csv');
            }
        });

        // 文字と色の定義
        const words = [
            { text: "赤", color_name: "red" },
            { text: "青", color_name: "blue" },
            { text: "緑", color_name: "green" }
        ];

        const colors = ["red", "blue", "green"];
        const response_map = { "red": "r", "blue": "b", "green": "g" };

        // 全ての組み合わせ（3文字 × 3色 = 9通り）を生成
        let stimuli = [];
        words.forEach(w => {
            colors.forEach(c => {
                stimuli.push({
                    stimulus_text: w.text,
                    stimulus_color: c,
                    correct_response: response_map[c],
                    condition: (w.color_name === c) ? 'congruent' : 'incongruent'
                });
            });
        });

        const timeline = [];

        // 環境によっては全画面化が制限されるため、このセクションを無効化または削除します。
        /*
        const fullscreen_trial = {
            type: jsPsychFullscreen,
            fullscreen_mode: true,
            button_label: '全画面表示を開始する'
        };
        timeline.push(fullscreen_trial);
        */

        // (2) 教示画面
        const instructions = {
            type: jsPsychHtmlKeyboardResponse,
            stimulus: `
                <div class="instruction-text">
                    <p>文字の<strong>「色」</strong>をキーボードで答えてください。</p>
                    <ul style="list-style: none; padding: 0;">
                        <li><span style="color: red;">■</span> 赤色なら <strong>'r'</strong></li>
                        <li><span style="color: blue;">■</span> 青色なら <strong>'b'</strong></li>
                        <li><span style="color: green;">■</span> 緑色なら <strong>'g'</strong></li>
                    </ul>
                    <p>スペースキーを押すと開始します。</p>
                </div>
            `,
            choices: [' '],
            post_trial_gap: 500
        };
        timeline.push(instructions);

        // a. 注視点
        const fixation = {
            type: jsPsychHtmlKeyboardResponse,
            stimulus: '<div style="font-size: 60px;">+</div>',
            choices: "NO_KEYS",
            trial_duration: 500,
            data: { task: 'fixation' }
        };

        // b. 刺激提示
        const stroop_trial = {
            type: jsPsychHtmlKeyboardResponse,
            stimulus: function() {
                const stim = jsPsych.timelineVariable('stimulus_text');
                const color = jsPsych.timelineVariable('stimulus_color');
                return `<div class="stroop-stimulus" style="color: ${color};">${stim}</div>`;
            },
            choices: ['r', 'b', 'g'],
            data: {
                task: 'response',
                correct_response: jsPsych.timelineVariable('correct_response'),
                condition: jsPsych.timelineVariable('condition')
            },
            on_finish: function(data) {
                // 正誤判定
                data.correct = jsPsych.pluginAPI.compareKeys(data.response, data.correct_response);
            }
        };

        // c. 試行間隔 (ITI)
        const iti = {
            type: jsPsychHtmlKeyboardResponse,
            stimulus: '',
            choices: "NO_KEYS",
            trial_duration: 1000,
            data: { task: 'iti' }
        };

        const test_procedure = {
            timeline: [fixation, stroop_trial, iti],
            timeline_variables: stimuli,
            sample: {
                type: 'with-replacement',
                size: 10 // 合計10試行
            }
        };
        timeline.push(test_procedure);

        jsPsych.run(timeline);
    </script>
</body>
</html>
